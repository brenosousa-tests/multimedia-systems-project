name: PR Validation

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  pr-validation:
    name: Validate Delivery PR
    runs-on: ubuntu-latest

    steps:
      # ----------------------------
      # Validate PR description
      # ----------------------------
      - name: Validate PR description
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || "";

            if (!body.includes("## Delivery")) {
              core.setFailed("Missing '## Delivery'");
            }

            if (!body.includes("## Checklist")) {
              core.setFailed("Missing '## Checklist'");
            }

      # ----------------------------
      # Validate checklist completed
      # ----------------------------
      - name: Validate checklist
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || "";
            const unchecked = body.match(/- \[ \]/g);

            if (unchecked) {
              core.setFailed("Checklist not completed");
            }

      # ----------------------------
      # Validate branch name
      # ----------------------------
      - name: Validate branch name
        run: |
          branch="${{ github.head_ref }}"

          if [[ ! "$branch" =~ ^student-[0-9]+-delivery[1-5]$ ]]; then
            echo "Branch must follow: student-XX-deliveryX"
            exit 1
          fi

      # ----------------------------
      # Validate changed files
      # ----------------------------
      - name: Validate changed files location
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request.number;

            const files = await github.paginate(
              github.rest.pulls.listFiles,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr
              }
            );

            const paths = files.map(f => f.filename);

            console.log("Files:", paths);

            if (paths.length !== 1) {
              core.setFailed("Only ONE file per delivery is allowed");
              return;
            }

            const file = paths[0];

            // Must be inside students/student-XX-name/
            if (!file.startsWith("students/student-")) {
              core.setFailed("File must be inside students/student-XX-name/");
              return;
            }

            // Extract folder
            const parts = file.split('/');
            const folder = parts.slice(0, 2).join('/');

            // Ensure no files outside that folder
            const invalid = paths.filter(p => !p.startsWith(folder));
            if (invalid.length > 0) {
              core.setFailed("Files outside student folder detected");
              return;
            }

            // Validate file name
            const validNames = [
              "delivery1.md",
              "delivery2.md",
              "delivery3.md",
              "delivery4.md",
              "delivery5.md"
            ];

            if (!validNames.some(name => file.endsWith(name))) {
              core.setFailed("Invalid file name. Must be deliveryX.md");
              return;
            }

      # ----------------------------
      # Validate delivery matches branch
      # ----------------------------
      - name: Validate delivery vs branch
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request.number;
            const branch = context.payload.pull_request.head.ref;

            const files = await github.paginate(
              github.rest.pulls.listFiles,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr
              }
            );

            const file = files[0].filename;

            if (branch.includes("delivery1") && !file.endsWith("delivery1.md")) {
              core.setFailed("Branch delivery1 must submit delivery1.md");
            }

            if (branch.includes("delivery2") && !file.endsWith("delivery2.md")) {
              core.setFailed("Branch delivery2 must submit delivery2.md");
            }

            if (branch.includes("delivery3") && !file.endsWith("delivery3.md")) {
              core.setFailed("Branch delivery3 must submit delivery3.md");
            }

            if (branch.includes("delivery4") && !file.endsWith("delivery4.md")) {
              core.setFailed("Branch delivery4 must submit delivery4.md");
            }

            if (branch.includes("delivery5") && !file.endsWith("delivery5.md")) {
              core.setFailed("Branch delivery5 must submit delivery5.md");
            }

      # ----------------------------
      # Validate file content
      # ----------------------------
      - name: Validate file content
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request.number;

            const files = await github.paginate(
              github.rest.pulls.listFiles,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr
              }
            );

            const file = files[0];

            if (file.changes === 0) {
              core.setFailed("File appears empty");
            }
